# innbucks.org — frontend is deployed on Vercel.
# Point your DNS A/CNAME records to Vercel, NOT to this VPS.
#
# Vercel DNS setup (in your domain registrar):
#   @   CNAME  cname.vercel-dns.com
#   www CNAME  cname.vercel-dns.com
#
# Then in Vercel dashboard → project → Settings → Domains → add innbucks.org
#
# This file is kept for reference only. The VPS only serves api.innbucks.org.
# See api.innbucks.org.conf for the active nginx config.
