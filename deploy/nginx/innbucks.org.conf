server {
    listen 80;
    server_name innbucks.org www.innbucks.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name innbucks.org www.innbucks.org;

    ssl_certificate     /etc/letsencrypt/live/innbucks.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/innbucks.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # MegaPay payment webhook
    location /webhook/megapay {
        proxy_pass         http://127.0.0.1:8005;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8005;
    }

    # Block everything else
    location / {
        return 404;
    }
}
